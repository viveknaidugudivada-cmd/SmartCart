<!DOCTYPE html>
<html>

<head>
    <title>All Orders</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        th {
            background-color: #f5f5f5;
        }

        .btn {
            padding: 5px 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

    <h2>📦 All Customer Orders</h2>

    <table>
        <tr>
            <th>Order ID</th>
            <th>User</th>
            <th>Amount</th>
            <th>Payment</th>
            <th>Status</th>
            <th>Date</th>
            <th>View</th>
        </tr>

        {% for order in orders %}
        <tr>
            <td>{{ order.order_id }}</td>
            <td>{{ order.username }}</td>
            <td>₹{{ order.amount }}</td>
            <td>{{ order.payment_status }}</td>
            <td>{{ order.order_status }}</td>
            <td>{{ order.created_at }}</td>
            <td>
                <a class="btn" href="/admin/order/{{ order.order_id }}">View</a>
            </td>
            <td>
                <a href="/admin/order/{{ order.order_id }}" class="btn">
                    View Details
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
