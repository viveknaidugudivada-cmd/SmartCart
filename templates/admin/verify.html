{% extends "base_auth.html" %}

{% block content %}

<style>
.auth-container {
    max-width: 400px;
    margin: 60px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.auth-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Flash */
.flash {
    background: #d1fae5;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}

/* Inputs */
.form-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
}

/* Button */
.btn-primary {
    width: 100%;
    background: linear-gradient(180deg, #2563eb, #1e40af);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}

.btn-primary:hover {
    opacity: 0.95;
}

.btn-primary:active {
    transform: scale(0.98);
}

/* Link */
.back-link {
    text-align: center;
    margin-top: 12px;
}

.back-link a {
    font-size: 13px;
    color: #2563eb;
    text-decoration: none;
}
</style>

<div class="auth-container">


<h2>🔐 Verify OTP</h2>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% set category, message = messages[-1] %}
    <div class="flash {{ category }}">
        {{ message }}
    </div>
  {% endif %}
{% endwith %}

<form method="POST" action="/verify-otp">

    <div class="form-group">
        <input type="text" name="otp" placeholder="Enter OTP" required>
    </div>

    <div class="form-group">
        <input type="password" name="password" placeholder="Create Password" required>
    </div>

    <button type="submit" class="btn-primary">
        Verify & Register
    </button>

</form>

<div class="back-link">
    <a href="/admin-login">Back to Login</a>
</div>


</div>

{% endblock %}
