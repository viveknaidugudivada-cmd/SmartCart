<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Update Product</title>

  <style>
    * {
      box-sizing: border-box;
    }

    /* ===== GLOBAL ===== */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 35px;
      /* 🔥 more breathing space */
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
      transition: all 0.25s ease;
    }

    /* subtle hover lift */
    .container:hover {
      transform: translateY(-3px);
    }

    /* ===== HEADER ===== */
    h2 {
      font-size: 24px;
      font-weight: 600;
      color: #0b1a2f;
      margin-bottom: 25px;
    }

    /* ===== FORM GROUP ===== */
    .form-group {
      margin-bottom: 18px;
    }

    /* ===== LABEL ===== */
    label {
      display: block;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    /* ===== INPUTS ===== */
    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    /* focus effect */
    input:focus,
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* textarea */
    textarea {
      resize: none;
      height: 90px;
    }

    /* ===== IMAGE PREVIEW ===== */
    .image-preview {
      margin-top: 8px;
    }

    .image-preview img {
      width: 130px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 5px;
      background: #f3f4f6;
    }

    /* ===== BUTTON ===== */
    .btn {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    /* hover */
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
    }

    /* ===== FLASH ===== */
    .flash {
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 10px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      font-size: 14px;
    }

    /* ===== BACK LINK ===== */
    .back-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #2563eb;
      font-size: 14px;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>✏️ Update Product</h2>

    <!-- Flash -->
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% set category, message = messages[-1] %}
    <div class="flash {{ category }}">
        {{ message }}
    </div>
  {% endif %}
{% endwith %}

    <form method="POST" enctype="multipart/form-data">

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description">{{ product.description }}</textarea>
      </div>

      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ product.category }}">
      </div>

      <div class="form-group">
        <label>Price</label>
        <input type="number" name="price" value="{{ product.price }}">
      </div>

      <div class="form-group">
        <label>Current Image</label>
        <div class="image-preview">
          <img src="/static/uploads/product_images/{{ product.image }}">
        </div>
      </div>

      <div class="form-group">
        <label>Upload New Image</label>
        <input type="file" name="image">
      </div>

      <button class="btn">Update Product</button>

    </form>

    <a href="/admin/item-list" class="back-link">← Back to Product List</a>

  </div>

</body>

</html>
