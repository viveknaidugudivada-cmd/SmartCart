<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SmartCart</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logo span {
            color: orange;
        }

        h3 {
            margin-bottom: 15px;
            font-weight: 600;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #f59e0b;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .back-link a {
            text-decoration: none;
            color: #2563eb;
        }

        .flash {
            font-size: 14px;
            margin-bottom: 10px;
            color: red;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="logo">🛒 Smart<span>Cart</span></div>

    <h3>Forgot Password</h3>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% set category, message = messages[-1] %}
    <div class="flash {{ category }}">
        {{ message }}
    </div>
  {% endif %}
{% endwith %}

    <form method="POST">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <button type="submit" class="btn-primary">
            Send Reset Link
        </button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('user_login' if role == 'user' else 'admin_login') }}">
            Back to Login
        </a>
    </div>

</div>

</body>
</html>
